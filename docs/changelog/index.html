<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Version History — Comedy Listings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Courier New", Courier, monospace;
      font-size: 16px;
      background: #fff;
      color: #111;
      line-height: 1.6;
    }

    a { color: #111; }
    a:hover { text-decoration: underline; }

    header {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 24px;
      border-bottom: 1px solid #111;
    }

    header a.back {
      display: inline-block;
      font-size: 16px;
      text-decoration: none;
      color: #111;
      margin-bottom: 16px;
    }

    header a.back:hover { text-decoration: underline; }

    header h1 {
      font-size: 16px;
      font-weight: bold;
    }

    header p.subtitle {
      font-size: 16px;
      color: #555;
      margin-top: 4px;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .entry {
      padding: 16px 0;
      border-bottom: 1px solid #eee;
    }

    .entry:last-child { border-bottom: none; }

    .entry-date {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .entry-summary {
      color: #555;
    }

    .empty-state {
      color: #888;
      padding: 24px 0;
    }

    footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 20px 40px;
      border-top: 1px solid #111;
      font-size: 16px;
      color: #888;
    }

    footer a { color: #111; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <a class="back" href="../">← all cities</a>
  <h1>VERSION HISTORY</h1>
  <p class="subtitle">a log of updates to comedy listings, one entry per day</p>
</header>

<main>

  <!-- CHANGELOG_ENTRIES_START -->
  <div class="empty-state">no updates logged yet.</div>
  <!-- CHANGELOG_ENTRIES_END -->

</main>

<footer>
  <a href="../">← all cities</a>
</footer>

</body>
</html>
