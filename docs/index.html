<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comedy Listings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Courier New", Courier, monospace;
      font-size: 16px;
      background: #fff;
      color: #111;
      line-height: 1.6;
    }

    a { color: #111; }
    a:hover { text-decoration: underline; }

    header {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 24px;
      border-bottom: 1px solid #111;
    }

    header h1 {
      font-size: 16px;
      font-weight: bold;
    }

    header p {
      font-size: 16px;
      color: #555;
      margin-top: 4px;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .section-label {
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      border-bottom: 1px solid #111;
      padding-bottom: 4px;
      margin-bottom: 16px;
    }

    .city-list {
      list-style: none;
      margin-bottom: 48px;
    }

    .city-list li {
      border-bottom: 1px solid #ddd;
    }

    .city-list li:last-child { border-bottom: none; }

    .city-list a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      text-decoration: none;
      color: #111;
      font-size: 16px;
    }

    .city-list a:hover .city-name { text-decoration: underline; }

    .city-region {
      color: #888;
      margin-left: 8px;
    }

    .request-box {
      border: 1px solid #ddd;
      padding: 16px;
      font-size: 16px;
      color: #555;
    }

    footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 20px 40px;
      border-top: 1px solid #111;
      font-size: 16px;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <h1>COMEDY LISTINGS</h1>
  <p>weekly comedy show listings, automatically updated.</p>
</header>

<main>

  <div class="section-label">Cities</div>

  <ul class="city-list">
    <li>
      <a href="philadelphia/">
        <span><span class="city-name">Philadelphia</span><span class="city-region">PA</span></span>
        <span>&rarr;</span>
      </a>
    </li>
  </ul>

  <div class="request-box">
    don't see your city? more coming soon.
  </div>

</main>

<footer>
  updated march 30, 2026 &mdash; <a href="changelog/">version history</a>
</footer>

</body>
</html>
