<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comedy Listings — Find Shows In Your City</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.5;
    }

    header {
      border-bottom: 3px solid #e63946;
      padding: 32px 20px 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header h1 span { color: #e63946; }

    header p {
      font-size: 15px;
      color: #555;
      margin-top: 6px;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }

    .city-list {
      list-style: none;
      margin-bottom: 48px;
    }

    .city-list li {
      border-bottom: 1px solid #f0f0f0;
    }

    .city-list li:last-child { border-bottom: none; }

    .city-list a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      text-decoration: none;
      color: #111;
    }

    .city-list a:hover .city-name { color: #e63946; }

    .city-name {
      font-size: 18px;
      font-weight: 700;
    }

    .city-region {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .city-arrow {
      font-size: 20px;
      color: #ccc;
    }

    .request-box {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 20px;
      font-size: 14px;
      color: #555;
    }

    .request-box strong {
      display: block;
      color: #111;
      font-size: 15px;
      margin-bottom: 6px;
    }

    footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 20px 40px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Comedy <span>Listings</span></h1>
  <p>Weekly comedy show listings, automatically updated.</p>
</header>

<main>

  <p class="section-label">Cities</p>

  <ul class="city-list">
    <li>
      <a href="philadelphia/">
        <div>
          <div class="city-name">Philadelphia</div>
          <div class="city-region">Pennsylvania</div>
        </div>
        <span class="city-arrow">→</span>
      </a>
    </li>
  </ul>

  <div class="request-box">
    <strong>Don't see your city?</strong>
    More cities coming soon. Check back for updates.
  </div>

</main>

<footer>
  Updated March 30, 2026
</footer>

</body>
</html>
